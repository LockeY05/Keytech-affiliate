[build]
  publish = "public"
    command = "hugo --gc --minify"

    [build.environment]
      HUGO_VERSION = "0.147.0"   # usa l'ultima stabile, verifica su github.com/gohugoio/hugo
        HUGO_ENV    = "production"
          HUGO_ENABLEGITINFO = "true"

          [context.deploy-preview]
            command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

            [context.branch-deploy]
              command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

              # Security headers (SEO + sicurezza)
              [[headers]]
                for = "/*"
                  [headers.values]
                      X-Frame-Options = "DENY"
                          X-Content-Type-Options = "nosniff"
                              Referrer-Policy = "strict-origin-when-cross-origin"
                                  Permissions-Policy = "geolocation=(), microphone=(), camera=()"

                                  # Cache aggressiva per asset statici (Core Web Vitals)
                                  [[headers]]
                                    for = "/css/*"
                                      [headers.values]
                                          Cache-Control = "public, max-age=31536000, immutable"

                                          [[headers]]
                                            for = "/js/*"
                                              [headers.values]
                                                  Cache-Control = "public, max-age=31536000, immutable"

                                                  # Redirect www → non-www (canonical SEO)
                                                  [[redirects]]
                                                    from = "https://www.tuosito.netlify.app/*"
                                                      to   = "https://tuosito.netlify.app/:splat"
                                                        status = 301
                                                          force  = true