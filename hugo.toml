baseURL = "https://keytechservice.netlify.app/"
languageCode = "it-it"
title = "KeyTech"
theme = "PaperMod"

# NUOVO — sintassi corretta da Hugo v0.128.0+
[pagination]
  pagerSize = 5

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

# googleAnalytics = "G-XXXXXXXXXX"

[minify]
disableXML = true
minifyOutput = true

# ------------------------------
# TAXONOMIES
# ------------------------------

[taxonomies]
tag = "tags"
category = "categorie"
series = "series"

# ------------------------------
# OUTPUTS
# ------------------------------

[outputs]
home = ["HTML", "RSS", "JSON"]

# ------------------------------
# PARAMS
# ------------------------------

[params]

env = "production"
title = "KeyTech"
description = "Recensioni, news e guide tech"
keywords = ["Tech", "Tastiere", "Recensioni", "Hardware"]
author = "KeyTech"

DateFormat = "2 January 2006"

defaultTheme = "auto"
disableThemeToggle = false

ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowWordCount = true
ShowRssButtonInSectionTermList = true
ShowToc = true
TocOpen = false

UseHugoToc = true
comments = false
math = false

disableSpecial1stPost = false
disableScrollToTop = false
disableAnchoredHeadings = false
hideMeta = false
hideSummary = false
showtoc = true
tocopen = false

mainSections = ["news", "recensioni", "guides", "keyboards"]

[params.assets]
disableHLJS = false
favicon = "favicon.ico"
favicon16x16 = "favicon-16x16.png"
favicon32x32 = "favicon-32x32.png"
apple_touch_icon = "apple-touch-icon.png"

[params.label]
text = "KeyTech"
# icon = "/apple-touch-icon.png"
# iconHeight = 35

[params.homeInfoParams]
Title = "KeyTech"
Content = "Recensioni, confronti, news e guide sul mondo tech."

[[params.socialIcons]]
#name = "github"
#url = "https://github.com/"

# [[params.socialIcons]]
# name = "youtube"
# url = "https://youtube.com/"

# [[params.socialIcons]]
# name = "x"
# url = "https://x.com/"


[permalinks]
  [permalinks.page]
      keyboards  = "/keyboards/:slug/"
          news       = "/news/:slug/"
              recensioni = "/recensioni/:slug/"
                  guides     = "/guides/:slug/"
                      audio      = "/audio/:slug/"

# ------------------------------
# MENU
# ------------------------------

[[menu.main]]
identifier = "home"
name = "Home"
url = "/"
weight = 10

[[menu.main]]
identifier = "news"
name = "News"
url = "/news/"
weight = 20

[[menu.main]]
identifier = "recensioni"
name = "Recensioni"
url = "/recensioni/"
weight = 30

[[menu.main]]
identifier = "categories"
name = "Categorie"
url = "/categories/"
weight = 40

[[menu.main]]
identifier = "keyboards"
name = "Keyboards"
url = "/keyboards/"
weight = 50

#[[menu.main]]
#identifier = "series"
#name = "Serie"
#url = "/series/"
#weight = 60

# ------------------------------
# MARKUP
# ------------------------------

[markup]

[markup.highlight]
noClasses = false

[markup.goldmark.renderer]
unsafe = true

# ------------------------------
# PRIVACY
# ------------------------------

[privacy]

#[privacy.vimeo]
#disabled = false
#simple = true

#[privacy.twitter]
#disabled = false
#enableDNT = true
#simple = true

#[privacy.instagram]
#disabled = false
#simple = true

[privacy.youtube]
disabled = false
privacyEnhanced = true

# ------------------------------
# SERVICES
# ------------------------------

[services]

#[services.instagram]
#disableInlineCSS = true

#[services.twitter]
#disableInlineCSS = true

